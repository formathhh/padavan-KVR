name: 小米MI-MINI

on: 
  workflow_dispatch:

permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget
    - name: Install UPX
      uses: crazy-max/ghaction-upx@v3
      with:
        version: v4.2.4
        install-only: true
    - name: Clone source code
      env:
        KERNEL: 3.4
      run: |
        git clone --depth=1 https://github.com/${GITHUB_REPOSITORY}.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/
        
        ##### 修改内存空间和 storage空间
        sed -i 's/SIZ=0x80000/SIZ=0x500000/g' /opt/rt-n56u/trunk/configs/boards/MI-MINI/kernel-3.4.x.config
        sed -i 's/size_etc="6M"/size_etc="5M"/g' /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i 's/size_tmp="24M"/size_tmp="30M"/g' /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i 's/mtd_part_size=65536/mtd_part_size=5242880/g' /opt/rt-n56u/trunk/user/scripts/mtd_storage.sh
    - name: Build Firmware
      env:
        TNAME: MI-MINI
        KERNEL: 3.4
      run: |
        cd /opt/rt-n56u/trunk
        if [ ! -f configs/templates/$TNAME.config ] ; then
        echo "configs/templates/$TNAME.config 没有找到 "
        exit 1
        fi
        cp -f configs/templates/$TNAME.config .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' .config
        ################################################################################################
        ###  清除默认配置###
        # VNT 组网
        echo "CONFIG_FIRMWARE_INCLUDE_VNTCLI=y" >> .config          # VNT客户端
        echo "CONFIG_FIRMWARE_INCLUDE_VNTS=y" >> .config            # VNT服务端
        
        # 虚拟组网
        echo "CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y" >> .config        # ZeroTier
        echo "CONFIG_FIRMWARE_INCLUDE_TAILSCALE=y" >> .config       # Tailscale
        echo "CONFIG_FIRMWARE_INCLUDE_NATPIERCE=y" >> .config       # 皎月连
        echo "CONFIG_FIRMWARE_INCLUDE_EASYTIER=y" >> .config        # EasyTier
        
        # 内网穿透/工具
        echo "CONFIG_FIRMWARE_INCLUDE_LUCKY=y" >> .config           # Lucky
        echo "CONFIG_FIRMWARE_INCLUDE_VIRTUALHERE=y" >> .config     # VirtualHere
        
        # DDNS
        echo "CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y" >> .config         # 阿里DDNS
        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config          # DDNSTO
        
        # OpenVPN（客户端+服务器）
        echo "CONFIG_FIRMWARE_INCLUDE_OPENVPN=y" >> .config         # OpenVPN客户端
        echo "CONFIG_FIRMWARE_INCLUDE_OPENVPN_SERVER=y" >> .config  # OpenVPN服务器
        
        # ========== 基础工具（保留必要）==========
        echo "CONFIG_FIRMWARE_INCLUDE_CURL=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TTYD=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_LRZSZ=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HTOP=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NANO=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IPERF3=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MTR=y" >> .config
        
        # ========== 其他所有插件全部禁用 ==========
        echo "CONFIG_FIRMWARE_INCLUDE_FRPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CLOUDFLARE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CLOUDFLARED=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WXSEND=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_BAFA=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALIST=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MSD_LITE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WIREGUARD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TUNSAFE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_UUPLUGIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALDRIVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NETCAT=n" >> .config
        
        # VirtualHere 特殊处理
        sed -i 's/EVM_RESTART_ALDRIVER/EVM_RESTART_VIRTUALHERE/g' ./user/httpd/common.h
        # 清除默认配置结束
        ######################################################################
        #以下选项是定义你需要的功能，（y=集成,n=忽略），重新写入到.config文件
        ######################################################################
        ##系统组件（精简）
        echo "CONFIG_FIRMWARE_ENABLE_IPV6=y" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_USB=y" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_UFSD=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_FAT=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_EXFAT=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_EXT2=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_EXT3=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_EXT4=y" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_XFS=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_FUSE=n" >> .config
        echo "CONFIG_FIRMWARE_ENABLE_SWAP=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_UVC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HID=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SERIAL=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_AUDIO=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_XFRM=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_QOS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IMQ=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IFB=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NFSD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CIFS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NTFS_3G=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_LPRD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_U2EC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TCPDUMP=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HDPARM=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_PARTED=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_SMBD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMBD36=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WINS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMBD_SYSLOG=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FTPD=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_RPL2TP=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_EAP_PEAP=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DDNS_SSL=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HTTPS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SFTP=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_DROPBEAR=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DROPBEAR_FAST_CODE=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_OPENSSH=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_SSWAN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_XUPNPD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MINIDLNA=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FIREFLY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_TRANSMISSION=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TRANSMISSION_WEB_CONTROL=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ARIA=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ARIA_WEB_CONTROL=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_CURL=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TTYD=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_LRZSZ=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_HTOP=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NANO=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_IPERF3=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MTR=y" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_GDUT_DRCOM=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DOGCOM=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MINIEAP=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NJIT_CLIENT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MENTOHUST=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_NAPT66=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SSSERVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_SERVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CLIENT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SOFTETHERVPN_CMD=n" >> .config
        
        echo "CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_VLMCSD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DUMP1090=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_RTL_SDR=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SOCAT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SRELAY=n" >> .config
        
        ##################################
        # ========== 你要的插件 ==========
        
        # VNT 组网
        echo "CONFIG_FIRMWARE_INCLUDE_VNTCLI=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_VNTS=y" >> .config
        
        # 虚拟组网
        echo "CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TAILSCALE=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NATPIERCE=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_EASYTIER=y" >> .config
        
        # 内网穿透/工具
        echo "CONFIG_FIRMWARE_INCLUDE_LUCKY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_VIRTUALHERE=y" >> .config
        
        # DDNS
        echo "CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config
        
        # OpenVPN（客户端+服务器）
        echo "CONFIG_FIRMWARE_INCLUDE_OPENVPN=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_OPENVPN_SERVER=y" >> .config
        
        # 禁用其他所有插件
        echo "CONFIG_FIRMWARE_INCLUDE_FRPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CLOUDFLARE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WXSEND=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_BAFA=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALIST=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_MSD_LITE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WIREGUARD=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TUNSAFE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_UUPLUGIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALDRIVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_NETCAT=n" >> .config
        
        # VirtualHere 特殊处理
        sed -i 's/EVM_RESTART_ALDRIVER/EVM_RESTART_VIRTUALHERE/g' ./user/httpd/common.h
        
        #########################################################################################
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/
        cp -f .config /opt/images/${TNAME}.config
        echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV
        echo "tag=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
    - name : Upload packages
      uses: actions/upload-artifact@master
      if: always()
      with:
        name: MI-MINI
        path: /opt/images

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
           > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.tag }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github)

           `型号.config` 是集成的插件模板
           
        tag_name: ${{ env.tag }}
        files: /opt/images/*
