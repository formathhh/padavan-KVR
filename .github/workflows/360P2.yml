name: 360P2

on: 
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master
      
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget jq
        
    - name: Install UPX
      uses: crazy-max/ghaction-upx@v3
      with:
        version: v4.2.4
        install-only: true
        
    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/${GITHUB_REPOSITORY}.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/
        
        echo "=== 修复 VirtualHere 宏定义 ==="
        echo '/* VirtualHere 宏定义修复 */' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef EVM_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define EVM_RESTART_VIRTUALHERE  (1 << 14)' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef EVT_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define EVT_RESTART_VIRTUALHERE  EVM_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef RCN_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define RCN_RESTART_VIRTUALHERE  1' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        
        cd /opt/rt-n56u/trunk/user/httpd
        sed -i 's/EVM_RESTART_VIRTUALHERE/EVT_RESTART_VIRTUALHERE/g' variables.c
        
        echo "=== 修复 EXT4 内核配置 ==="
        cd /opt/rt-n56u/trunk
        KERNEL_CONFIG="configs/boards/360P2/kernel-3.4.x.config"
        
        sed -i '/CONFIG_EXT4_FS/d' $KERNEL_CONFIG
        sed -i '/CONFIG_EXT4_USE_FOR_EXT23/d' $KERNEL_CONFIG
        sed -i '/CONFIG_EXT4_FS_XATTR/d' $KERNEL_CONFIG
        sed -i '/CONFIG_EXT4_FS_POSIX_ACL/d' $KERNEL_CONFIG
        sed -i '/CONFIG_EXT4_FS_SECURITY/d' $KERNEL_CONFIG
        
        echo "" >> $KERNEL_CONFIG
        echo "# EXT4 文件系统支持 - 完整配置" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_USE_FOR_EXT23=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_XATTR=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_SECURITY=y" >> $KERNEL_CONFIG
        
        sed -i 's/SIZ=0x80000/SIZ=0x500000/g' /opt/rt-n56u/trunk/configs/boards/360P2/kernel-3.4.x.config
        sed -i 's/size_etc="6M"/size_etc="5M"/g' /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i 's/size_tmp="24M"/size_tmp="30M"/g' /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i 's/mtd_part_size=65536/mtd_part_size=5242880/g' /opt/rt-n56u/trunk/user/scripts/mtd_storage.sh
        
        echo "=== 创建自动配置脚本 ==="
        echo '#!/bin/bash' > /opt/rt-n56u/trunk/auto_config.sh
        echo 'cd /opt/rt-n56u/trunk/linux-3.4.x' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'if [ ! -f .config ]; then' >> /opt/rt-n56u/trunk/auto_config.sh
        echo '    cp ../configs/boards/360P2/kernel-3.4.x.config .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'fi' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'echo "CONFIG_EXT4_FS=y" >> .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'echo "CONFIG_EXT4_USE_FOR_EXT23=y" >> .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'echo "CONFIG_EXT4_FS_XATTR=y" >> .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'echo "CONFIG_EXT4_FS_SECURITY=y" >> .config' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'yes "" | make oldconfig' >> /opt/rt-n56u/trunk/auto_config.sh
        echo 'cd /opt/rt-n56u/trunk' >> /opt/rt-n56u/trunk/auto_config.sh
        
        chmod +x /opt/rt-n56u/trunk/auto_config.sh
        
    - name: Build Firmware
      env:
        TNAME: 360P2
      run: |
        cd /opt/rt-n56u/trunk
        
        if [ ! -f configs/templates/$TNAME.config ] ; then
          echo "configs/templates/$TNAME.config 没有找到 "
          exit 1
        fi
        
        cp -f configs/templates/$TNAME.config .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' .config
        
        sed -i '/CONFIG_FIRMWARE_ENABLE_IPV6/d' .config
        sed -i '/CONFIG_FIRMWARE_ENABLE_USB/d' .config
        sed -i '/CONFIG_FIRMWARE_ENABLE_UFSD/d' .config
