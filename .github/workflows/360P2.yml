name: 360P2

on: 
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master
      
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget jq
        
    - name: Install UPX
      uses: crazy-max/ghaction-upx@v3
      with:
        version: v4.2.4
        install-only: true
        
    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/${GITHUB_REPOSITORY}.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/
        
        # 修改 Web UI 为白色主题
        cd /opt/rt-n56u/trunk/user/httpd
        find . -name "*.c" -o -name "*.h" | while read file; do
          sed -i 's/bgcolor="[^"]*"/bgcolor="#f5f5f5"/g' "$file"
          sed -i 's/background:[^;]*;/background:#f5f5f5;/g' "$file"
          sed -i 's/color:[^;]*;/color:#333333;/g' "$file"
        done
        
        # 修复 VirtualHere
        cat >> /opt/rt-n56u/trunk/user/httpd/common.h << "EOF"
/* VirtualHere 宏定义修复 */
#ifndef EVM_RESTART_VIRTUALHERE
#define EVM_RESTART_VIRTUALHERE  (1 << 14)
#endif
#ifndef EVT_RESTART_VIRTUALHERE
#define EVT_RESTART_VIRTUALHERE  EVM_RESTART_VIRTUALHERE
#endif
#ifndef RCN_RESTART_VIRTUALHERE
#define RCN_RESTART_VIRTUALHERE  1
#endif
EOF
        cd /opt/rt-n56u/trunk/user/httpd
        sed -i 's/EVM_RESTART_VIRTUALHERE/EVT_RESTART_VIRTUALHERE/g' variables.c
        
        # 修复 EXT4
        cd /opt/rt-n56u/trunk
        KERNEL_CONFIG="configs/boards/360P2/kernel-3.4.x.config"
        sed -i '/CONFIG_EXT4_FS/d' $KERNEL_CONFIG
        cat >> $KERNEL_CONFIG << "EOF"
CONFIG_EXT4_FS=y
CONFIG_EXT4_USE_FOR_EXT23=y
CONFIG_EXT4_FS_XATTR=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y
EOF
        sed -i 's/SIZ=0x80000/SIZ=0x500000/g' $KERNEL_CONFIG
        
        # 创建自动配置脚本
        cat > auto_config.sh << "EOF"
#!/bin/bash
cd linux-3.4.x
[ ! -f .config ] && cp ../configs/boards/360P2/kernel-3.4.x.config .config
echo "CONFIG_EXT4_FS=y" >> .config
echo "CONFIG_EXT4_USE_FOR_EXT23=y" >> .config
echo "CONFIG_EXT4_FS_XATTR=y" >> .config
echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> .config
echo "CONFIG_EXT4_FS_SECURITY=y" >> .config
yes "" | make oldconfig
EOF
        chmod +x auto_config.sh
        
    - name: Build Firmware
      env:
        TNAME: 360P2
      run: |
        cd /opt/rt-n56u/trunk
        cp -f configs/templates/$TNAME.config .config
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' .config
        cat >> .config << "EOF"
CONFIG_FIRMWARE_ENABLE_IPV6=y
CONFIG_FIRMWARE_ENABLE_USB=y
CONFIG_FIRMWARE_ENABLE_EXT4=y
CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y
CONFIG_FIRMWARE_INCLUDE_TAILSCALE=y
CONFIG_FIRMWARE_INCLUDE_VIRTUALHERE=y
EOF
        ./auto_config.sh
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        if [ -d images ]; then
          sudo mv -f images/*.trx /opt/images/ 2>/dev/null || true
        fi
        echo "tag=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
        
    - name: Upload packages
      uses: actions/upload-artifact@master
      if: always()
      with:
        name: 360P2
        path: /opt/images

    - name: Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ env.tag }}
        files: /opt/images/*
