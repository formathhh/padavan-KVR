name: 360P2

on: 
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@master
      
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget jq
        
    - name: Install UPX
      uses: crazy-max/ghaction-upx@v3
      with:
        version: v4.2.4
        install-only: true
        
    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/${GITHUB_REPOSITORY}.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/
        
        # ========== 修改 Web UI 为经典白色主题 ==========
        echo "=== 修改 Web UI 为经典白色主题 ==="
        cd /opt/rt-n56u/trunk/user/httpd
        
        # 修改所有 .c 文件中的 HTML 样式
        find . -name "*.c" -o -name "*.h" | while read file; do
          sed -i 's/bgcolor="[^"]*"/bgcolor="#f5f5f5"/g' "$file"
          sed -i 's/background:[^;]*;/background:#f5f5f5;/g' "$file"
          sed -i 's/color:[^;]*;/color:#333333;/g' "$file"
        done
        
        echo "=== Web UI 主题修改完成 ==="
        
        # ========== 修复 VirtualHere 编译错误 ==========
        echo "=== 修复 VirtualHere 宏定义 ==="
        echo '/* VirtualHere 宏定义修复 */' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef EVM_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define EVM_RESTART_VIRTUALHERE  (1 << 14)' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef EVT_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define EVT_RESTART_VIRTUALHERE  EVM_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#ifndef RCN_RESTART_VIRTUALHERE' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#define RCN_RESTART_VIRTUALHERE  1' >> /opt/rt-n56u/trunk/user/httpd/common.h
        echo '#endif' >> /opt/rt-n56u/trunk/user/httpd/common.h
        
        cd /opt/rt-n56u/trunk/user/httpd
        sed -i 's/EVM_RESTART_VIRTUALHERE/EVT_RESTART_VIRTUALHERE/g' variables.c
        
        # ========== 修复 EXT4 内核配置 ==========
        echo "=== 修复 EXT4 内核配置 ==="
        cd /opt/rt-n56u/trunk
        KERNEL_CONFIG="configs/boards/360P2/kernel-3.4.x.config"
        
        sed -i '/CONFIG_EXT4_FS/d' $KERNEL_CONFIG
        sed -i '/CONFIG_EXT4_USE_FOR_EXT23/d' $KERNEL_CONFIG
        
        echo "" >> $KERNEL_CONFIG
        echo "# EXT4 文件系统支持" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_USE_FOR_EXT23=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_XATTR=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> $KERNEL_CONFIG
        echo "CONFIG_EXT4_FS_SECURITY=y" >> $KERNEL_CONFIG
        
        sed -i 's/SIZ=0x80000/SIZ=0x500000/g' $KERNEL_CONFIG
        sed -i 's/size_etc="6M"/size_etc="5M"/g' user/scripts/dev_init.sh
        sed -i 's/size_tmp="24M"/size_tmp="30M"/g' user/scripts/dev_init.sh
        
        # ========== 创建自动配置脚本 ==========
        cat > auto_config.sh << 'EOF'
#!/bin/bash
cd linux-3.4.x
[ ! -f .config ] && cp ../configs/boards/360P2/kernel-3.4.x.config .config
echo "CONFIG_EXT4_FS=y" >> .config
echo "CONFIG_EXT4_USE_FOR_EXT23=y" >> .config
echo "CONFIG_EXT4_FS_XATTR=y" >> .config
echo "CONFIG_EXT4_FS_POSIX_ACL=y" >> .config
echo "CONFIG_EXT4_FS_SECURITY=y" >> .config
yes "" | make oldconfig
EOF
        chmod +x auto_config.sh
        
    - name: Build Firmware
      env:
        TNAME: 360P2
      run: |
        cd /opt/rt-n56u/trunk
        
        if [ ! -f configs/templates/$TNAME.config ]; then
          echo "configs/templates/$TNAME.config 没有找到"
          exit 1
        fi
        
        cp -f configs/templates/$TNAME.config .config
        
        # 启用 OpenSSL
        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' .config
        
        # 添加基础功能
        cat >> .config << 'CONFIG'
CONFIG_FIRMWARE_ENABLE_IPV6=y
CONFIG_FIRMWARE_ENABLE_USB=y
CONFIG_FIRMWARE_ENABLE_EXT4=y
CONFIG_FIRMWARE_ENABLE_FUSE=y
CONFIG_FIRMWARE_ENABLE_SWAP=y
CONFIG_FIRMWARE_INCLUDE_SERIAL=y
CONFIG_FIRMWARE_INCLUDE_XFRM=y
CONFIG_FIRMWARE_INCLUDE_QOS=y
CONFIG_FIRMWARE_INCLUDE_TTYD=y
CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y
CONFIG_FIRMWARE_INCLUDE_TAILSCALE=y
CONFIG_FIRMWARE_INCLUDE_VIRTUALHERE=y
CONFIG_FIRMWARE_INCLUDE_OPENVPN=y
CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y
CONFIG_FIRMWARE_INCLUDE_OPENSSL_EC=y
CONFIG
        # 运行内核配置
        ./auto_config.sh
        
        # 编译
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        
        # 移动固件
        if [ -d images ]; then
          sudo mv -f images/*.trx /opt/images/ 2>/dev/null || true
          cp -f .config /opt/images/${TNAME}.config 2>/dev/null || true
        fi
        
        echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV
        echo "tag=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
        
    - name: Upload packages
      uses: actions/upload-artifact@master
      if: always()
      with:
        name: 360P2
        path: /opt/images

    - name: Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.tag }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github)
          
          `360P2.config` 是集成的插件模板
        tag_name: ${{ env.tag }}
        files: /opt/images/*
